spring.application.name=hospital-management

server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/hospital?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:hospital}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:hospital_secret}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

# Groq API Configuration. Set GROQ_API_KEY in the environment; never commit the key.
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
