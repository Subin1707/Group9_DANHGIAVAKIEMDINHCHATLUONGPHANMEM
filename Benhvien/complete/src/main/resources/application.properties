spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/hospital?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:hospital}
spring.datasource.password=${DB_PASSWORD:hospital_secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cổng chạy server
server.port=8080

# Groq API Configuration. Set GROQ_API_KEY in the environment; never commit the key.
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
