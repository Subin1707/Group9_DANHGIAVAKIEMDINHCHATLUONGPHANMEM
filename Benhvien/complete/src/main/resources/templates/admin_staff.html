<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản Nhân Viên</title>
    <link rel="stylesheet" href="/patients.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <header class="page-header">
        <h1><i class="fas fa-user-shield"></i> Tạo Tài Khoản Nhân Viên</h1>
        <nav class="breadcrumb">
            <a href="/dashboard"><i class="fas fa-home"></i> Trang chủ</a> / Admin / Nhân viên
        </nav>
    </header>

    <div th:if="${errorMessage}" class="alert alert-error">
        <i class="fas fa-exclamation-triangle"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${successMessage}"></span>
    </div>

    <div class="form-section">
        <h2><i class="fas fa-user-plus"></i> Thêm nhân viên mới</h2>

        <form action="/admin/staff" method="post" class="patient-form">
            <input type="hidden" name="_csrf" th:value="${csrfToken}" />
            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <input id="username" name="username" class="form-control" required placeholder="vd: nv01">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Mật khẩu <span class="required">*</span></label>
                    <input id="password" type="password" name="password" class="form-control" required placeholder="ít nhất 6 ký tự">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu <span class="required">*</span></label>
                    <input id="confirmPassword" type="password" name="confirmPassword" class="form-control" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Tạo tài khoản
                </button>
                <a href="/dashboard" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </a>
            </div>
        </form>
    </div>
</div>

<!-- Chatbox Fragment -->
<div th:replace="~{fragments/chatbox :: chatbox}"></div>
</body>
</html>
