<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu</title>
    <link rel="stylesheet" href="/portal.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="portal-container">
    <div class="topbar">
        <div class="brand">
            <h1>Hệ thống Quản lý Khám Bệnh</h1>
            <p>Đổi mật khẩu</p>
        </div>
        <div class="top-actions">
            <a class="icon-btn" href="/portal/notifications" aria-label="Thông báo">
                <i class="fa-regular fa-bell"></i>
                <span class="badge" th:text="${notificationCount}">2</span>
            </a>
            <div class="user-chip">
                <div class="avatar"><i class="fa-regular fa-user"></i></div>
                <div class="name" th:text="${displayName}">Nguyễn Văn An</div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <a class="active" href="/portal/profile"><i class="fa-regular fa-id-card"></i> Thông tin cá nhân</a>
        <a href="/portal/appointments/new"><i class="fa-regular fa-calendar-plus"></i> Đặt lịch khám</a>
        <a href="/portal/appointments"><i class="fa-regular fa-calendar-check"></i> Quản lý lịch khám</a>
        <a href="/portal/benhan"><i class="fa-regular fa-file-lines"></i> Bệnh án</a>
        <a href="/portal/schedule"><i class="fa-solid fa-pills"></i> Lịch cấp thuốc</a>
        <a href="/portal/notifications"><i class="fa-regular fa-bell"></i> Thông báo</a>
        <a href="/logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất</a>
    </nav>

    <div class="content">
        <section class="card">
            <div class="card-header">
                <h2 class="card-title">Đổi mật khẩu</h2>
                <a class="btn btn-muted" href="/portal/profile"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
            </div>

            <div th:if="${errorMessage}" class="pill danger" style="justify-content:center;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span th:text="${errorMessage}">Lỗi</span>
            </div>
            <div th:if="${successMessage}" class="pill success" style="justify-content:center;">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${successMessage}">OK</span>
            </div>

            <form action="/portal/password" method="post" style="margin-top: 14px;">
                <div class="grid">
                    <div class="field">
                        <i class="fa-solid fa-lock"></i>
                        <div>
                            <div class="label">Mật khẩu hiện tại</div>
                            <input class="input" type="password" name="currentPassword" required />
                        </div>
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-key"></i>
                        <div>
                            <div class="label">Mật khẩu mới</div>
                            <input class="input" type="password" name="newPassword" required />
                        </div>
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-key"></i>
                        <div>
                            <div class="label">Xác nhận mật khẩu</div>
                            <input class="input" type="password" name="confirmPassword" required />
                        </div>
                    </div>
                </div>

                <div style="margin-top: 14px; display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-save"></i> Cập nhật</button>
                </div>
            </form>
        </section>
    </div>
</div>

<!-- Chatbox Fragment -->
<div th:replace="~{fragments/chatbox :: chatbox}"></div>
</body>
</html>
