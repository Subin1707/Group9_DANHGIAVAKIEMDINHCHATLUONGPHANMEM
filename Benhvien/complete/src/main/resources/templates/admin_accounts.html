<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tài Khoản</title>
    <link rel="stylesheet" href="/patients.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <header class="page-header">
        <h1><i class="fas fa-users-cog"></i> Quản Lý Tài Khoản</h1>
        <nav class="breadcrumb">
            <a href="/dashboard"><i class="fas fa-home"></i> Trang chủ</a> / Admin / Tài khoản
        </nav>
    </header>

    <div class="form-actions" style="margin-bottom: 16px;">
        <a href="/admin/staff" class="btn btn-primary">
            <i class="fas fa-user-plus"></i> Tạo nhân viên
        </a>
        <a href="/dashboard" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>
    </div>

    <div class="table-section">
        <h3><i class="fas fa-list"></i> Danh sách tài khoản</h3>

        <div class="table-wrapper">
            <table class="data-table" th:if="${users != null and !users.isEmpty()}">
                <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Created</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.username}">user</td>
                    <td th:text="${u.role}">USER</td>
                    <td th:text="${u.createdAt}">2026-01-01</td>
                    <td>
                        <a class="btn btn-search btn-sm" th:href="@{'/admin/accounts/' + ${u.username}}">
                            <i class="fas fa-id-card"></i> Hồ sơ
                        </a>
                        <form th:if="${u.username != 'admin'}" th:action="@{'/admin/accounts/' + ${u.username} + '/delete'}" method="post" style="display:inline;">
                            <input type="hidden" name="_csrf" th:value="${csrfToken}" />
                            <button class="btn btn-reset btn-sm" type="submit" onclick="return confirm('Xóa tài khoản này?');">
                                <i class="fas fa-trash"></i> Xóa
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${users == null or users.isEmpty()}" class="alert alert-error">
                <i class="fas fa-exclamation-triangle"></i>
                <span>Chưa có tài khoản nào trong hệ thống.</span>
            </div>
        </div>
    </div>
</div>

<!-- Chatbox Fragment -->
<div th:replace="~{fragments/chatbox :: chatbox}"></div>
</body>
</html>
