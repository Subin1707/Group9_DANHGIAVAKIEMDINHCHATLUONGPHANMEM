services:
  app:
    build: .
    container_name: hospital-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: hospital
      DB_PASSWORD: ${DB_PASSWORD:-hospital_secret}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_API_URL: ${GROQ_API_URL:-https://api.groq.com/openai/v1/chat/completions}
    ports:
      - "${APP_PORT:-8080}:8080"

  mysql:
    image: mysql:8.4
    container_name: hospital-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hospital
      MYSQL_USER: hospital
      MYSQL_PASSWORD: ${DB_PASSWORD:-hospital_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${DB_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - hospital_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: hospital-zap
    tty: true
    stdin_open: true
    depends_on:
      - app
    volumes:
      - ./docker/zap:/zap/wrk
    command: sleep infinity

volumes:
  hospital_mysql_data:
